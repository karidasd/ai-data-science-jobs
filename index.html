<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI & Data Science Job Radar</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="glow"></div>
    <div class="container">
        <header>
            <h1>AI & Data Science <span class="accent">Job Radar</span></h1>
            <p>Live analysis of global remote job requirements.</p>
            <div class="stats" id="stats-container">
                <!-- Injected via JS -->
            </div>
        </header>

        <main>
            <div class="radar-container">
                <div class="radar-header">
                    <h2>Most In-Demand Tech Skills</h2>
                    <p>Based on NLP extraction from live job descriptions.</p>
                </div>
                <div id="skills-list" class="skills-list">
                    <!-- Skills injected here -->
                </div>
            </div>
        </main>
        
        <footer>
            <p>Data sourced from Remotive & Jobicy APIs. Updated daily.</p>
        </footer>
    </div>
    <script src="script.js"></script>
</body>
</html>
